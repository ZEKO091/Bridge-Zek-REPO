mutation CreateDeveloper @auth(level: USER) {
  developer_insert(data: { id_expr: "auth.uid", username: "dev", email: "dev@example.com" })
}

mutation UpdateDeveloper @auth(level: USER) {
  developer_update(key: { id_expr: "auth.uid" }, data: { bio: "Updated bio" })
}

mutation DeleteDeveloper @auth(level: USER) {
  developer_delete(key: { id_expr: "auth.uid" })
}

query GetDeveloper @auth(level: USER) {
  developer(key: { id_expr: "auth.uid" }) { username email }
}

query ListDevelopers @auth(level: PUBLIC, insecureReason: "Publicly visible developer directory.") {
  developers { username bio }
}

mutation CreateProject @auth(level: USER) {
  project_insert(data: { title: "New Project", description: "Desc", createdAt_expr: "request.time", ownerId_expr: "auth.uid" })
}

mutation UpdateProject @auth(level: USER) {
  project_update(key: { id: "00000000-0000-0000-0000-000000000000" }, data: { title: "New Title" })
}

mutation DeleteProject @auth(level: USER) {
  project_delete(key: { id: "00000000-0000-0000-0000-000000000000" })
}

query GetProject @auth(level: PUBLIC, insecureReason: "Projects are public portfolio items.") {
  project(id: "00000000-0000-0000-0000-000000000000") { title description }
}

query ListProjects @auth(level: PUBLIC, insecureReason: "Public project list.") {
  projects { title repoUrl }
}

mutation CreateVibePrompt @auth(level: USER) {
  vibePrompt_insert(data: { content: "Prompt", status: "Active", project: { id: "00000000-0000-0000-0000-000000000000" } })
}

mutation UpdateVibePrompt @auth(level: USER) {
  vibePrompt_update(key: { id: "00000000-0000-0000-0000-000000000000" }, data: { status: "Done" })
}

mutation DeleteVibePrompt @auth(level: USER) {
  vibePrompt_delete(key: { id: "00000000-0000-0000-0000-000000000000" })
}

query GetVibePrompt @auth(level: USER) {
  vibePrompt(id: "00000000-0000-0000-0000-000000000000") { content status }
}

query ListVibePrompts @auth(level: USER) {
  vibePrompts { content complexityScore }
}

mutation CreateAgentSession @auth(level: USER) {
